<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>值日生小幫手｜手機版</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--text:#172033;--muted:#728096;--line:#e5eaf1;--nav:#0f172a;--primary:#315bd6;--primary2:#eaf0ff;--ok:#15803d;--warn:#c26a09;--danger:#c33434}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif}body{padding-bottom:90px}.app{max-width:520px;margin:0 auto;min-height:100vh}.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,#0f172a,#243b6b);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 18px;border-radius:0 0 24px 24px;box-shadow:0 8px 24px rgba(15,23,42,.18)}.eyebrow{font-size:12px;opacity:.7}.title{font-size:24px;font-weight:800;margin-top:2px}.date{font-size:13px;opacity:.82;margin-top:2px}.dutycard{margin-top:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px 14px}.dutyrow{display:flex;justify-content:space-between;gap:12px;align-items:center}.dutyname{font-size:17px;font-weight:800}.week{font-size:12px;opacity:.72;margin-top:3px}.daycount{font-size:12px;background:rgba(255,255,255,.14);padding:5px 8px;border-radius:999px;white-space:nowrap}.page{display:none;padding:16px}.page.active{display:block}.section-title{font-size:14px;font-weight:800;color:#445168;margin:6px 2px 10px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 5px 18px rgba(15,23,42,.05);margin-bottom:12px}.priority{background:linear-gradient(180deg,#fff,#fff8f6);border:1px solid #f4d2cb}.priority .label{font-size:12px;font-weight:800;color:var(--danger);letter-spacing:.04em}.priority .taskname{font-size:19px;font-weight:800;line-height:1.45;margin-top:5px}.priority .time{font-size:13px;color:var(--muted);margin-top:3px}.primary-action{width:100%;margin-top:12px;border:0;border-radius:14px;padding:13px 16px;background:var(--primary);color:#fff;font-weight:800;font-size:16px}.progress-head{display:flex;justify-content:space-between;align-items:end}.progress-head strong{font-size:18px}.progress-track{height:10px;background:#eef1f5;border-radius:999px;overflow:hidden;margin-top:10px}.progress-fill{height:100%;background:var(--primary);width:0;transition:.2s}.task{display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}.task:last-child{border-bottom:0}.check{appearance:none;width:25px;height:25px;border:2px solid #cbd4e0;border-radius:8px;margin:1px 0 0;display:grid;place-content:center;flex:0 0 auto;background:#fff}.check:checked{background:var(--primary);border-color:var(--primary)}.check:checked:after{content:'✓';color:#fff;font-size:17px;font-weight:900}.task-title{font-size:16px;font-weight:750;line-height:1.45}.task-meta{margin-top:3px;font-size:12px;color:var(--muted)}.late{color:var(--danger);font-weight:800}.soon{color:var(--warn);font-weight:800}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:750;color:#66748a;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;font:inherit;border:1px solid #d7dee8;border-radius:13px;padding:12px 13px;background:#fff;color:var(--text);outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:#8da5eb;box-shadow:0 0 0 3px #edf1ff}.field textarea{min-height:110px;resize:vertical}.numgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btnrow{display:flex;gap:9px}.btn{flex:1;border:0;border-radius:13px;padding:12px 14px;font-weight:800;font-size:15px}.btn.primary{background:var(--primary);color:#fff}.btn.soft{background:var(--primary2);color:#2445a8}.btn.danger{background:#fff0f0;color:#a42525}.result{white-space:pre-wrap;background:#f7f9fc;border:1px dashed #ccd5e0;border-radius:14px;padding:13px;line-height:1.65;font-size:14px;min-height:100px}.small{font-size:12px;color:var(--muted)}.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.chip{font-size:12px;padding:6px 9px;border-radius:999px;background:#eef2f7;color:#506079}.docgrid{display:grid;grid-template-columns:1fr;gap:8px}.docitem{display:flex;align-items:center;gap:10px;background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:11px}.bottomnav{position:fixed;z-index:30;left:50%;transform:translateX(-50%);bottom:0;width:min(520px,100%);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr)}.navbtn{border:0;background:transparent;color:#7b8799;padding:7px 2px 3px;font-size:11px;font-weight:700}.navbtn .ico{display:block;font-size:21px;line-height:1;margin-bottom:4px}.navbtn.active{color:var(--primary)}.notice{font-size:12px;color:var(--muted);text-align:center;padding:4px 8px 14px}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="eyebrow">作模處勤務工具</div>
    <div class="title">值日生小幫手</div>
    <div class="date" id="todayText"></div>
    <div class="dutycard">
      <div class="dutyrow">
        <div><div class="small" style="color:#dce5ff">本週值日生</div><div class="dutyname" id="dutyNameText">尚未設定</div><div class="week" id="weekRangeText"></div></div>
        <div class="daycount" id="dayCountText"></div>
      </div>
    </div>
  </header>

  <main>
    <section class="page active" id="page-today">
      <div class="section-title">現在該做什麼</div>
      <div class="card priority">
        <div class="label">目前優先</div>
        <div class="taskname" id="priorityTask">載入中…</div>
        <div class="time" id="priorityTime"></div>
        <button class="primary-action" id="priorityBtn" onclick="completePriority()">完成這項任務</button>
      </div>
      <div class="card">
        <div class="progress-head"><div><div class="small">今日完成進度</div><strong id="progressText">0 / 0</strong></div><div class="small" id="progressPercent">0%</div></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="card"><div id="taskList"></div></div>
    </section>

    <section class="page" id="page-report">
      <div class="section-title">人數與事故回報</div>
      <div class="card">
        <div class="numgrid">
          <div class="field"><label>應有</label><input id="expected" type="number" min="0" value="0"></div>
          <div class="field"><label>休假</label><input id="leave" type="number" min="0" value="0"></div>
          <div class="field"><label>公差</label><input id="dutyAway" type="number" min="0" value="0"></div>
          <div class="field"><label>住院</label><input id="hospital" type="number" min="0" value="0"></div>
          <div class="field"><label>其他</label><input id="other" type="number" min="0" value="0"></div>
          <div class="field"><label>事故</label><select id="incident"><option value="none">無事故</option><option value="yes">有事故</option></select></div>
        </div>
        <div class="field"><label>事故摘要</label><textarea id="incidentNote" placeholder="有事故時簡要輸入"></textarea></div>
        <div class="btnrow"><button class="btn primary" onclick="generateReport()">產生回報</button><button class="btn soft" onclick="copyReport()">複製</button></div>
      </div>
      <div class="card"><div class="result" id="reportResult">尚未產生回報。</div></div>
    </section>

    <section class="page" id="page-docs">
      <div class="section-title">公文與環境勤務</div>
      <div class="card">
        <div class="small">上呈公文送達確認</div>
        <div class="docgrid" style="margin-top:10px">
          <label class="docitem"><input class="check" type="checkbox" data-doc="主任室" onchange="saveDocChecks()"><span>參謀主任辦公室</span></label>
          <label class="docitem"><input class="check" type="checkbox" data-doc="主計處" onchange="saveDocChecks()"><span>主計處</span></label>
          <label class="docitem"><input class="check" type="checkbox" data-doc="督察室" onchange="saveDocChecks()"><span>督察室</span></label>
        </div>
      </div>
      <div class="card">
        <div class="small">資源回收狀態</div>
        <div class="chiprow">
          <button class="btn soft" onclick="setRecycle('正常')">正常</button>
          <button class="btn soft" onclick="setRecycle('接近滿')">接近滿</button>
          <button class="btn danger" onclick="setRecycle('需打包清運')">需清運</button>
        </div>
        <div class="small" style="margin-top:10px">目前：<b id="recycleText">尚未檢查</b></div>
      </div>
    </section>

    <section class="page" id="page-handover">
      <div class="section-title">臨時事項與交接</div>
      <div class="card">
        <div class="field"><label>新增臨時事項</label><input id="quickItem" placeholder="例如：1630前送○○資料"></div>
        <button class="btn soft" style="width:100%" onclick="addQuickItem()">加入今日任務</button>
      </div>
      <div class="card">
        <div class="field"><label>交接事項</label><textarea id="handover" placeholder="未結事項、下週注意事項…"></textarea></div>
        <div class="btnrow"><button class="btn primary" onclick="saveHandover()">儲存</button><button class="btn soft" onclick="copyHandover()">複製交接</button></div>
      </div>
    </section>

    <section class="page" id="page-settings">
      <div class="section-title">本週設定</div>
      <div class="card">
        <div class="field"><label>值日生姓名／級職</label><input id="dutyName" placeholder="例如：黃○○上尉"></div>
        <button class="btn primary" style="width:100%" onclick="saveDutyName()">儲存本週值日生</button>
      </div>
      <div class="card">
        <div class="small">維護操作</div>
        <div class="btnrow" style="margin-top:10px"><button class="btn danger" onclick="resetToday()">重置今日勾選</button></div>
      </div>
      <div class="notice">資料僅儲存在此瀏覽器 localStorage。iPhone 直接預覽 HTML 可能無法完整互動，建議在 Safari 中開啟。</div>
    </section>
  </main>

  <nav class="bottomnav">
    <button class="navbtn active" data-page="today" onclick="switchPage('today',this)"><span class="ico">✓</span>今日勤務</button>
    <button class="navbtn" data-page="report" onclick="switchPage('report',this)"><span class="ico">人</span>人員回報</button>
    <button class="navbtn" data-page="docs" onclick="switchPage('docs',this)"><span class="ico">文</span>公文環境</button>
    <button class="navbtn" data-page="handover" onclick="switchPage('handover',this)"><span class="ico">交</span>交接事項</button>
    <button class="navbtn" data-page="settings" onclick="switchPage('settings',this)"><span class="ico">⚙</span>設定</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
const baseTasks=[
 {id:'print-today',label:'印當天工作管制表給處長',time:'08:30'},
 {id:'headcount',label:'統計當天處內人數、事故，並於 LINE 群組與處長回報',time:'09:00'},
 {id:'briefing',label:'集合參謀至休閒室開處報',time:'09:10'},
 {id:'docs',label:'送上呈公文至參謀主任辦公室、主計處及督察室',time:'機動'},
 {id:'recycle',label:'檢視資源回收是否過滿，必要時打包送回收場',time:'每日巡查'},
 {id:'trash',label:'倒一般垃圾',time:'15:00'},
 {id:'print-next',label:'處長參加參謀工作協調會前，印隔日工作管制表給處長',time:'15:30前'}
];
const keyDate=()=>{const d=new Date();const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`};
const startOfWeek=d=>{let x=new Date(d);let day=x.getDay()||7;x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x};
const endOfWeek=d=>{let x=startOfWeek(d);x.setDate(x.getDate()+4);return x};
const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
function loadState(){try{return JSON.parse(localStorage.getItem('dutyAssistantMobile')||'{}')}catch{return {}}}
function saveState(s){localStorage.setItem('dutyAssistantMobile',JSON.stringify(s))}
function getTodayState(){let s=loadState();s.days=s.days||{};s.days[keyDate()]=s.days[keyDate()]||{done:{},quick:[],docs:{},recycle:'尚未檢查'};return s}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
function switchPage(page,btn){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+page).classList.add('active');document.querySelectorAll('.navbtn').forEach(x=>x.classList.remove('active'));btn.classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function init(){
 const now=new Date();document.getElementById('todayText').textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
 document.getElementById('weekRangeText').textContent=`${fmt(startOfWeek(now))}－${fmt(endOfWeek(now))}`;
 const weekday=now.getDay();document.getElementById('dayCountText').textContent=weekday>=1&&weekday<=5?`第 ${weekday} / 5 勤務日`:'週末';
 let s=getTodayState(),day=s.days[keyDate()];document.getElementById('dutyName').value=s.dutyName||'';document.getElementById('dutyNameText').textContent=s.dutyName||'尚未設定';document.getElementById('handover').value=s.handover||'';document.getElementById('recycleText').textContent=day.recycle||'尚未檢查';
 document.querySelectorAll('[data-doc]').forEach(cb=>cb.checked=!!day.docs[cb.dataset.doc]);renderTasks();
}
function saveDutyName(){let s=getTodayState();s.dutyName=document.getElementById('dutyName').value.trim();saveState(s);document.getElementById('dutyNameText').textContent=s.dutyName||'尚未設定';toast('已儲存本週值日生')}
function getStatus(t,done){if(done||!t.time.includes(':'))return '';let [h,m]=t.time.replace('前','').split(':').map(Number);if(!Number.isFinite(h))return '';let now=new Date(),target=new Date();target.setHours(h,m||0,0,0);let diff=(target-now)/60000;if(diff<0)return '<span class="late">已逾時間</span>';if(diff<=20)return '<span class="soon">即將到點</span>';return ''}
function renderTasks(){let s=getTodayState(),day=s.days[keyDate()],tasks=[...baseTasks,...(day.quick||[])];let html='',doneCount=0;
 tasks.forEach(t=>{let done=!!day.done[t.id];if(done)doneCount++;html+=`<label class="task"><input class="check" type="checkbox" ${done?'checked':''} onchange="toggleTask('${t.id}',this.checked)"><div><div class="task-title">${t.label}</div><div class="task-meta">${t.time} ${getStatus(t,done)}</div></div></label>`});
 document.getElementById('taskList').innerHTML=html;let pct=tasks.length?Math.round(doneCount/tasks.length*100):0;document.getElementById('progressText').textContent=`${doneCount} / ${tasks.length}`;document.getElementById('progressPercent').textContent=`${pct}%`;document.getElementById('progressFill').style.width=pct+'%';updatePriority(tasks,day.done)
}
function updatePriority(tasks,done){let now=new Date();let pending=tasks.filter(t=>!done[t.id]);let timed=pending.map(t=>{let score=99999;if(t.time.includes(':')){let [h,m]=t.time.replace('前','').split(':').map(Number);let target=new Date();target.setHours(h,m||0,0,0);score=(target-now)/60000;if(score<0)score-=10000;}return {...t,score}}).sort((a,b)=>a.score-b.score);let cand=timed[0];let btn=document.getElementById('priorityBtn');if(cand){document.getElementById('priorityTask').textContent=cand.label;document.getElementById('priorityTime').textContent=cand.time;btn.style.display='block';btn.dataset.id=cand.id}else{document.getElementById('priorityTask').textContent='今日固定勤務已完成';document.getElementById('priorityTime').textContent='辛苦了，記得確認交接事項。';btn.style.display='none'}}
function completePriority(){let id=document.getElementById('priorityBtn').dataset.id;if(id)toggleTask(id,true)}
function toggleTask(id,val){let s=getTodayState();s.days[keyDate()].done[id]=val;saveState(s);renderTasks()}
function resetToday(){let s=getTodayState();s.days[keyDate()].done={};saveState(s);renderTasks();toast('今日勾選已重置')}
function addQuickItem(){let val=document.getElementById('quickItem').value.trim();if(!val)return;let s=getTodayState();s.days[keyDate()].quick.push({id:'q-'+Date.now(),label:val,time:'臨時'});saveState(s);document.getElementById('quickItem').value='';renderTasks();toast('已加入今日任務')}
function n(id){return Number(document.getElementById(id).value||0)}
function generateReport(){let expected=n('expected'),leave=n('leave'),away=n('dutyAway'),hospital=n('hospital'),other=n('other'),actual=Math.max(0,expected-leave-away-hospital-other);let inc=document.getElementById('incident').value,note=document.getElementById('incidentNote').value.trim();let text=`報告處長，今日應有${expected}員，休假${leave}員、公差${away}員、住院${hospital}員、其他${other}員，實到${actual}員；`+(inc==='none'?'截至目前人員均安，無事故，報告完畢。':`事故狀況：${note||'請補充事故摘要'}。報告完畢。`);document.getElementById('reportResult').textContent=text}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('已複製')}catch{let ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已複製')}}
function copyReport(){copyText(document.getElementById('reportResult').textContent)}
function saveDocChecks(){let s=getTodayState(),day=s.days[keyDate()];document.querySelectorAll('[data-doc]').forEach(cb=>day.docs[cb.dataset.doc]=cb.checked);saveState(s)}
function setRecycle(v){let s=getTodayState();s.days[keyDate()].recycle=v;saveState(s);document.getElementById('recycleText').textContent=v;if(v!=='尚未檢查')s.days[keyDate()].done['recycle']=true;saveState(s);renderTasks();toast('已更新資源回收狀態')}
function saveHandover(){let s=getTodayState();s.handover=document.getElementById('handover').value;saveState(s);toast('交接事項已儲存')}
function copyHandover(){let s=getTodayState(),now=new Date(),name=s.dutyName||'未設定';let text=`值日勤務交接\n本週值日生：${name}\n值勤期間：${fmt(startOfWeek(now))}－${fmt(endOfWeek(now))}\n\n交接事項：\n${document.getElementById('handover').value||'無'}`;copyText(text)}
init();setInterval(renderTasks,60000);
</script>
</body>
</html>
