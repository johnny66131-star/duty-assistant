<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17375e"><link rel="manifest" href="manifest.webmanifest"><title>值日生小幫手</title><style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#17202a}header{background:#17375e;color:white;padding:calc(16px + env(safe-area-inset-top)) 18px 16px}h1{margin:0;font-size:21px}.sub{opacity:.8;font-size:13px;margin-top:5px}main{padding:14px 14px 100px;max-width:680px;margin:auto}.card{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px #0000000d}h2{font-size:17px;margin:0 0 12px}.note{background:#edf3f8;border-radius:12px;padding:12px;font-size:14px;line-height:1.5}.rem{border:1px solid #dfe5ec;border-radius:14px;padding:12px;margin:10px 0}.head{display:flex;gap:9px;align-items:center}.head input{width:23px;height:23px}.head b{flex:1}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;color:#697586;font-size:13px;margin:10px 0 5px}input,select,button{font:inherit}input[type=time],select{width:100%;padding:12px;border:1px solid #dfe5ec;border-radius:11px;background:white;font-size:16px}.btn{width:100%;padding:13px;border:0;border-radius:12px;background:#17375e;color:white;font-weight:800;font-size:16px;margin-top:10px}.secondary{background:#e9eef4;color:#17375e}.status{font-size:13px;color:#697586;line-height:1.5;margin-top:10px}</style></head><body>
<header><h1>值日生小幫手</h1><div class="sub">V1 PWA｜勤務提醒設定</div></header><main>
<div class="card"><h2>🔔 勤務提醒設定</h2><div class="note">各值日生可自行設定時間與提前提醒。iPhone 建議先用 Safari「加入主畫面」，再從桌面圖示開啟並允許通知。</div><div id="list"></div><button class="btn" id="enable">啟用勤務通知</button><button class="btn secondary" id="test">測試通知</button><div class="status" id="status"></div></div>
<div class="card"><h2>目前提醒原則</h2><div class="status">一般垃圾預設 15:00；隔日工作管制表預設 15:30 前完成。其他時間皆可由使用者自行設定。本版已加入 PWA、離線快取與 Web Notification 基礎。</div></div>
<div class="card"><h2>重要限制</h2><div class="status">GitHub Pages 本身不能在 App 完全關閉後，依排程主動從伺服器送出真正背景推播。本版在網頁／PWA仍運作時可發通知；下一階段若要完全背景推播，需要再串接推播後端。</div></div>
</main><script>
const defs=[["sheet","當日工作管制表","07:50",10],["people","人數／事故回報","08:10",5],["brief","處報集合","08:20",5],["trash","一般垃圾清運","15:00",10],["next","隔日工作管制表","15:30",15]];
let d=JSON.parse(localStorage.getItem("dutyPwa")||"{}");d.r=d.r||{};const list=document.getElementById("list");
function save(){localStorage.setItem("dutyPwa",JSON.stringify(d))}
defs.forEach(([id,n,t,l])=>{let v=d.r[id]||{on:true,time:t,lead:l};d.r[id]=v;let x=document.createElement("div");x.className="rem";x.innerHTML=`<div class="head"><input class="on" type="checkbox" ${v.on?"checked":""}><b>${n}</b></div><div class="row"><div><label>任務時間</label><input class="time" type="time" value="${v.time}"></div><div><label>提前提醒</label><select class="lead">${[0,5,10,15,30].map(q=>`<option value="${q}" ${q==v.lead?"selected":""}>${q?`${q} 分鐘`:"準時"}</option>`).join("")}</select></div></div>`;x.onchange=()=>{v.on=x.querySelector(".on").checked;v.time=x.querySelector(".time").value;v.lead=+x.querySelector(".lead").value;save()};list.appendChild(x)});save();
async function notify(title,body){if(Notification.permission!=="granted")return;if(navigator.serviceWorker){let r=await navigator.serviceWorker.ready;r.showNotification(title,{body,icon:"icon.svg",tag:title})}else new Notification(title,{body})}
enable.onclick=async()=>{if(!("Notification"in window)){status.textContent="此瀏覽器不支援 Web 通知。";return}let p=await Notification.requestPermission();status.textContent=p==="granted"?"通知權限已允許。":"通知尚未獲允許。"};
test.onclick=()=>notify("值日生小幫手","這是一則勤務提醒測試通知。");
let fired={};setInterval(()=>{let now=new Date();if(now.getDay()==0||now.getDay()==6)return;let m=now.getHours()*60+now.getMinutes();defs.forEach(([id,n])=>{let v=d.r[id];if(!v?.on)return;let a=v.time.split(":").map(Number),target=a[0]*60+a[1]-v.lead,k=now.toDateString()+id+v.time+v.lead;if(m>=target&&m<target+2&&!fired[k]){notify("值日勤務提醒",`${n}${v.lead?`將於 ${v.lead} 分鐘後到點`:"時間已到"}。`);fired[k]=1}})},30000);
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js");
</script></body></html>
